<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jarvis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #111820;
    --border: #1e2d3d;
    --border2: #243040;
    --accent: #00d4ff;
    --success: #00ff88;
    --warning: #ffd166;
    --error: #ff3355;
    --text: #c9d1d9;
    --muted: #4a5568;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 0%, rgba(0,212,255,0.07) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 100%, rgba(255,107,53,0.04) 0%, transparent 45%);
    pointer-events: none; z-index: 0;
  }

  .header {
    padding: 24px 20px 16px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
    background: rgba(8,12,16,0.95); backdrop-filter: blur(10px);
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .logo-row { display: flex; align-items: baseline; gap: 10px; }
  h1 {
    font-size: 28px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .version { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 2px; }
  .header-sub { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--muted);
    transition: background 0.3s; flex-shrink: 0;
  }
  .status-dot.connected { background: var(--success); box-shadow: 0 0 8px rgba(0,255,136,0.5); animation: pulse 2s ease infinite; }
  .status-dot.error { background: var(--error); }

  .main { padding: 20px; position: relative; z-index: 1; max-width: 540px; margin: 0 auto; }

  .progress-bar { height: 2px; background: var(--border); border-radius: 1px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), rgba(0,212,255,0.4)); border-radius: 1px; transition: width 0.4s ease; width: 0%; }

  .step { display: none; animation: fadeUp 0.4s ease both; }
  .step.active { display: block; }

  .section { margin-bottom: 18px; }
  .section-label {
    font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 3px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 8px; opacity: 0.7;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  input, textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
    color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 500;
    padding: 12px 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; -webkit-appearance: none;
  }
  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,212,255,0.1); }
  input::placeholder, textarea::placeholder { color: var(--muted); font-weight: 400; }
  textarea { resize: none; min-height: 80px; line-height: 1.5; }
  .input-mono { font-family: 'Share Tech Mono', monospace; font-size: 13px; }

  .score-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
    padding: 16px; display: flex; align-items: center; gap: 16px;
  }
  .score-ring { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .track { fill: none; stroke: var(--border2); stroke-width: 3; }
  .score-ring .fill { fill: none; stroke: var(--muted); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 138.2; stroke-dashoffset: 138.2; }
  .score-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono', monospace; font-size: 14px; color: var(--muted); }
  .score-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 4px; }
  .score-placeholder { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--warning); opacity: 0.7; line-height: 1.5; }

  .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .status-btn {
    padding: 10px 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
    color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 1px; text-align: center; cursor: pointer; transition: all 0.15s; text-transform: uppercase;
  }
  .status-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }

  .btn-primary {
    width: 100%; padding: 16px; background: transparent; border: 1px solid var(--accent);
    color: var(--accent); font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase; border-radius: 3px; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary:active { background: rgba(0,212,255,0.12); box-shadow: 0 0 24px rgba(0,212,255,0.2); transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-secondary {
    width: 100%; padding: 13px; background: transparent; border: 1px solid var(--border2);
    color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase; border-radius: 3px; cursor: pointer; transition: all 0.2s; margin-top: 10px;
  }
  .btn-secondary:active { border-color: var(--muted); color: var(--text); }

  .field-row {
    background: var(--surface); border: 1px solid var(--border); border-radius: 3px;
    padding: 10px 14px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start;
  }
  .field-key {
    font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; width: 70px; padding-top: 2px;
  }
  .field-val { font-size: 15px; font-weight: 500; color: var(--text); flex: 1; word-break: break-word; }

  /* SETUP */
  .setup-label { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; opacity: 0.8; }

  .success-screen { text-align: center; padding: 32px 0; }
  .success-icon { font-size: 44px; margin-bottom: 12px; display: block; }
  .success-title { font-size: 28px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--success); margin-bottom: 6px; }
  .success-sub { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; }
  .success-company { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 28px; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(0,212,255,0.2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px;
    padding: 12px 20px; font-family: 'Share Tech Mono', monospace; font-size: 12px;
    letter-spacing: 1px; z-index: 100; transition: transform 0.3s ease; white-space: nowrap; max-width: 90vw;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(0,255,136,0.4); color: var(--success); }
  .toast.error { border-color: rgba(255,51,85,0.4); color: var(--error); }
  .toast.info { border-color: rgba(0,212,255,0.3); color: var(--accent); }

  .gap { height: 12px; }
  .gap-sm { height: 8px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 8px rgba(0,255,136,0.4); } 50% { box-shadow: 0 0 16px rgba(0,255,136,0.7); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo-row">
      <h1>Jarvis</h1>
      <span class="version">v0.4</span>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>
  <div class="header-sub" id="headerSub">// job application system</div>
</div>

<div class="main">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <!-- STEP 1: URL -->
  <div class="step active" id="step1">
    <div class="section">
      <div class="section-label">Job Posting URL</div>
      <textarea id="jobUrl" class="input-mono" placeholder="Paste job posting URL here..." rows="3"></textarea>
    </div>
    <button class="btn-primary" onclick="analyzeJob()">Analyze Posting</button>
  </div>

  <!-- STEP 2: REVIEW -->
  <div class="step" id="step2">
    <div class="section">
      <div class="section-label">Company</div>
      <input type="text" id="company" placeholder="Company name" />
    </div>
    <div class="section">
      <div class="section-label">Role</div>
      <input type="text" id="role" placeholder="Job title" />
    </div>
    <div class="section">
      <div class="section-label">Salary Range</div>
      <input type="text" id="salary" placeholder="e.g. $80k – $110k" />
    </div>
    <div class="section">
      <div class="section-label">Match Score</div>
      <div class="score-card">
        <div class="score-ring">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <circle class="track" cx="28" cy="28" r="22" />
            <circle class="fill" id="scoreArc" cx="28" cy="28" r="22" />
          </svg>
          <div class="score-number" id="scoreNumber">—</div>
        </div>
        <div class="score-info">
          <div class="score-label">// match score</div>
          <div id="scoreDetail" style="font-size:13px; color: var(--muted); line-height:1.5;">Analyzing...</div>
          <div id="resumeRec" style="font-family:'Share Tech Mono',monospace; font-size:11px; color: var(--accent); margin-top:6px; opacity:0.8;"></div>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Notes</div>
      <textarea id="notes" placeholder="Role summary and key requirements..."></textarea>
    </div>
    <button class="btn-primary" onclick="goToStep3()">Confirm & Continue</button>
    <button class="btn-secondary" onclick="goToStep('step1')">← Back</button>
  </div>

  <!-- STEP 3: STATUS + DOCS -->
  <div class="step" id="step3">
    <div class="section">
      <div class="section-label">Application Status</div>
      <div class="status-grid">
        <div class="status-btn active" onclick="selectStatus(this)" data-status="Applied">Applied</div>
        <div class="status-btn" onclick="selectStatus(this)" data-status="Phone Screen">Screening</div>
        <div class="status-btn" onclick="selectStatus(this)" data-status="Interview">Interview</div>
        <div class="status-btn" onclick="selectStatus(this)" data-status="Offer">Offer</div>
        <div class="status-btn" onclick="selectStatus(this)" data-status="Rejected">Rejected</div>
        <div class="status-btn" onclick="selectStatus(this)" data-status="Ghosted">Ghosted</div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Resume Version URL</div>
      <input type="url" id="resumeUrl" placeholder="Google Doc URL (optional)" />
    </div>
    <div class="section">
      <div class="section-label">Cover Letter URL</div>
      <input type="url" id="coverUrl" placeholder="Google Doc URL (optional)" />
    </div>
    <div class="gap"></div>
    <button class="btn-primary" id="logBtn" onclick="logApplication()">Log to Notion</button>
    <button class="btn-secondary" onclick="goToStep('step2')">← Back</button>
  </div>

  <!-- SUCCESS -->
  <div class="step" id="stepSuccess">
    <div class="success-screen">
      <span class="success-icon">✓</span>
      <div class="success-title">Logged</div>
      <div class="success-sub">// application recorded</div>
      <div class="success-company" id="successCompany"></div>
      <button class="btn-primary" onclick="resetFlow()">Log Another</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const PROXY = 'https://black-union-2df2.maunint.workers.dev/notion';
  const DB_ID = '3323844b182c80eeac17ce16242ebd44';
  let selectedStatus = 'Applied';

  // Auto-connect on load
  window.addEventListener('load', async () => {
    try {
      const res = await notionRequest('GET', `databases/${DB_ID}`);
      if (res.ok) {
        document.getElementById('statusDot').classList.add('connected');
        document.getElementById('headerSub').textContent = '// ready — paste a job url';
      } else {
        document.getElementById('statusDot').classList.add('error');
        document.getElementById('headerSub').textContent = '// connection error';
      }
    } catch(e) {
      document.getElementById('statusDot').classList.add('error');
    }
  });

  // ── NOTION REQUEST ────────────────────────────────────
  async function notionRequest(method, path, body) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    return fetch(`${PROXY}/${path}`, opts);
  }

  // ── ANALYZE ───────────────────────────────────────────
  async function analyzeJob() {
    const url = document.getElementById('jobUrl').value.trim();
    if (!url) { showToast('Paste a job URL first', 'error'); return; }

    showToast('Analyzing...', 'info');
    setProgress(30);

    const SKILLS_PROFILE = `
Maunin Trivedi — Paid Search / Paid Media Specialist
8+ years experience. Currently Paid Ads Specialist at BoomerangFX (July 2025–present).

Core skills: Google Ads, Meta Ads, LinkedIn Ads, TikTok Ads, Pinterest Ads, Microsoft Ads (Bing), SA360
Multi-account management: 150+ accounts, up to $800K/month spend
Strategy: Full-funnel B2B and B2C, CRO, conversion tracking, account audits, competitive research, A/B testing
Tools: Google Analytics, GTM, Looker Studio, SA360, Salesforce, Excel
Certifications: Google Ads Search, Google Analytics IQ, SA360
Notable results: Peak ROAS 36x, 30-40% lead volume improvement, sub-$600 CPL in competitive legal market
Background: Founded and ran agency (Numina Digital) for 5 years, 50+ clients
Consultative sales experience: carried and exceeded budget growth quotas at Teleperformance/Google

Resume versions available:
- Base: general paid media specialist
- Google GCS: consultative sales angle (best for account manager / sales roles)
- Stripe: paid search specialist (best for in-house paid search roles)
- Tailored: SA360 emphasis (best for enterprise/agency roles requiring SA360)
- Directive: agency/enterprise focus
`;

    try {
      const response = await fetch('https://black-union-2df2.maunint.workers.dev/claude/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          system: `You are a job application assistant. Analyze job postings and match them against a candidate's skills profile. Return ONLY valid JSON with no markdown or backticks:
{
  "company": "string",
  "role": "string",
  "salary": "string or empty",
  "notes": "2-3 sentence summary of role and key requirements",
  "score": number between 0-100,
  "score_reason": "one sentence explaining the score",
  "resume_version": "one of: Base, Google GCS, Stripe, Tailored, Directive",
  "resume_reason": "one sentence explaining why this resume version fits best"
}`,
          messages: [{ role: 'user', content: `Candidate profile:\n${SKILLS_PROFILE}\n\nAnalyze this job posting and score the match: ${url}` }],
          tools: [{ type: 'web_search_20250305', name: 'web_search' }]
        })
      });

      const data = await response.json();
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
      let extracted = {};
      try { extracted = JSON.parse(text.replace(/```json|```/g, '').trim()); } catch(e) {}

      document.getElementById('company').value = extracted.company || '';
      document.getElementById('role').value = extracted.role || '';
      document.getElementById('salary').value = extracted.salary || '';
      document.getElementById('notes').value = extracted.notes || '';

      // Update score display
      const score = extracted.score || 0;
      updateScoreRing(score);
      document.getElementById('scoreDetail').textContent = extracted.score_reason || '';
      document.getElementById('resumeRec').textContent = extracted.resume_version
        ? `→ Use ${extracted.resume_version} resume`
        : '';

      goToStep('step2');
      setProgress(50);
      showToast('Posting analyzed ✓', 'success');
    } catch(e) {
      goToStep('step2');
      setProgress(50);
      showToast('Enter details manually', 'info');
    }
  }

  function updateScoreRing(score) {
    const arc = document.getElementById('scoreArc');
    const num = document.getElementById('scoreNumber');
    if (!arc || !num) return;

    const circumference = 138.2;
    const offset = circumference - (score / 100) * circumference;
    arc.style.strokeDashoffset = offset;

    let color = '#ff3355'; // red
    if (score >= 70) color = '#00ff88';
    else if (score >= 45) color = '#ffd166';
    arc.style.stroke = color;
    num.style.color = color;
    num.textContent = score;
  }

  // ── LOG ───────────────────────────────────────────────
  async function logApplication() {
    const company = document.getElementById('company').value.trim();
    const role = document.getElementById('role').value.trim();
    if (!company || !role) { showToast('Company and role required', 'error'); return; }

    const btn = document.getElementById('logBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Logging...';

    const today = new Date().toISOString().split('T')[0];
    const salary = document.getElementById('salary').value.trim();
    const notes = document.getElementById('notes').value.trim();
    const resumeUrl = document.getElementById('resumeUrl').value.trim();
    const coverUrl = document.getElementById('coverUrl').value.trim();
    const jobUrl = document.getElementById('jobUrl').value.trim();

    const properties = {
      'Name': { title: [{ text: { content: `${company} — ${role}` } }] },
      'Status': { select: { name: selectedStatus } },
      'Date Applied': { date: { start: today } }
    };

    const scoreVal = parseInt(document.getElementById('scoreNumber').textContent);
    if (!isNaN(scoreVal)) properties['Match Score'] = { number: scoreVal };
    if (jobUrl) properties['Job posting URL'] = { url: jobUrl };
    if (salary) properties['Salary range'] = { rich_text: [{ text: { content: salary } }] };
    if (notes) properties['Notes'] = { rich_text: [{ text: { content: notes } }] };
    if (resumeUrl) properties['Resume Version'] = { url: resumeUrl };
    if (coverUrl) properties['Cover letter version'] = { url: coverUrl };

    try {
      const res = await notionRequest('POST', 'pages', {
        parent: { database_id: DB_ID },
        properties
      });

      if (res.ok) {
        document.getElementById('successCompany').textContent = `${company} — ${role}`;
        goToStep('stepSuccess');
        setProgress(100);
      } else {
        const err = await res.json();
        showToast(err.message || 'Failed to log', 'error');
        btn.disabled = false;
        btn.textContent = 'Log to Notion';
      }
    } catch(e) {
      showToast('Network error', 'error');
      btn.disabled = false;
      btn.textContent = 'Log to Notion';
    }
  }

  // ── NAV ───────────────────────────────────────────────
  function goToStep(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  function goToStep3() {
    const company = document.getElementById('company').value.trim();
    const role = document.getElementById('role').value.trim();
    if (!company || !role) { showToast('Company and role required', 'error'); return; }
    goToStep('step3'); setProgress(75);
  }

  function setProgress(pct) { document.getElementById('progressFill').style.width = pct + '%'; }

  function selectStatus(el) {
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    selectedStatus = el.dataset.status;
  }

  function resetFlow() {
    ['jobUrl','company','role','salary','notes','resumeUrl','coverUrl'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.status-btn').classList.add('active');
    selectedStatus = 'Applied';
    setProgress(10);
    goToStep('step1');
  }

  // ── TOAST ─────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
